    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #1a0b2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #e0d4f7;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(26, 11, 46, 0.6);
            border: 1px solid rgba(138, 92, 246, 0.3);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(138, 92, 246, 0.15);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #e879f9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #c4b5fd;
            font-weight: 300;
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .qr-card {
            background: rgba(45, 27, 78, 0.5);
            border: 1px solid rgba(168, 139, 250, 0.3);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .qr-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(138, 92, 246, 0.3);
            border-color: rgba(168, 139, 250, 0.6);
        }

        .qr-card h2 {
            font-size: 1.3rem;
            color: #c4b5fd;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .qr-image-wrapper {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .qr-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .qr-description {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #a78bfa;
            font-weight: 400;
        }

        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(168, 139, 250, 0.3);
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
            background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .qr-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .qr-card {
                padding: 1rem;
            }

            .qr-card h2 {
                font-size: 1rem;
                margin-bottom: 1rem;
            }

            .qr-image-wrapper {
                padding: 0.5rem;
            }

            .qr-image {
                max-width: 150px;
            }

            .qr-description {
                font-size: 0.75rem;
                margin-top: 0.5rem;
            }
        }

        /* Modal for full-size view */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);

        .modal-content {
            position: relative;
            margin: auto;
            display: block;
            width: 90%;

        .close {

            top: 15px;

            color: #a78bfa;

            font-weight: bold;

            text-align: center;
            color: #c4b5fd;

    <div class="container">
        <header>
            <h1 id="page-title"></h1>
            <p id="page-subtitle" class="subtitle"></p>
        </header>

        <div id="qr-grid" class="qr-grid"></div>

        <div class="text-center">
            <a id="back-button" class="back-button" href="#"></a>
        </div>
    </div>

    <!-- Modal for full-size view -->
    <div id="qrModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
        <div class="modal-title" id="modalTitle"></div>
    </div>

    <script>
        // qrcodes.json is the single source of truth (same file the
        // generator reads). Fetched at runtime so any edit reflects on next
        // load — no regeneration of qrcode.html needed.
        const MANIFEST_PATHS = [
            './qrcodes.json',
            './typescript/qrcode/qrcodes.json',
        ];
        let PUBLIC_DIR = 'public';

        function openModal(imageFile, title) {
            const modal = document.getElementById('qrModal');
            modal.style.display = 'block';
            document.getElementById('modalImage').src = PUBLIC_DIR + '/' + imageFile;
            document.getElementById('modalTitle').textContent = title;
        }
        function closeModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        // ?vcard=<id> auto-downloads the matching .vcf so the OS receives a
        // real file and offers "Add to Contacts".
        function triggerVcfDownload(manifest) {
            const id = new URLSearchParams(location.search).get('vcard');
            if (!id) return;
            const entry = (manifest.vcfFiles || []).find((v) => v.id === id);
            if (!entry) {
                console.warn('?vcard=' + id + ' is not in manifest.vcfFiles');
                return;
            }
            const basename = entry.output.split('/').pop();
            const a = document.createElement('a');
            a.href = PUBLIC_DIR + '/' + basename;
            a.setAttribute('download', basename);
            a.setAttribute('type', 'text/vcard');
            a.style.display = 'none';
            document.body.appendChild(a);
            try { a.click(); } catch (e) { /* fallback: user taps a card */ }
        }

        function renderManifest(manifest) {
            const page = manifest.page || {};
            PUBLIC_DIR = page.publicDir || 'public';

            if (page.title) {
                document.title = page.subtitle
                    ? page.title + ' | ' + page.subtitle
                    : page.title;
                document.getElementById('page-title').textContent = page.title;
            }
            if (page.subtitle)
                document.getElementById('page-subtitle').textContent = page.subtitle;
            const back = document.getElementById('back-button');
            back.href = page.backHref || '#';
            back.textContent = page.backText || 'Back';

            triggerVcfDownload(manifest);

            const grid = document.getElementById('qr-grid');
            grid.innerHTML = '';
            for (const qr of manifest.qrcodes || []) {
                const card = document.createElement('div');
                card.className = 'qr-card';
                const titleText = qr.title || qr.id;
                card.addEventListener('click', () => openModal(qr.output, titleText));

                const h2 = document.createElement('h2');
                h2.textContent = titleText;

                const wrap = document.createElement('div');
                wrap.className = 'qr-image-wrapper';
                const img = document.createElement('img');
                img.className = 'qr-image';
                img.alt = 'QR Code - ' + titleText;
                img.src = PUBLIC_DIR + '/' + qr.output;
                wrap.appendChild(img);

                card.appendChild(h2);
                card.appendChild(wrap);
                if (qr.description) {
                    const desc = document.createElement('p');
                    desc.className = 'qr-description';
                    desc.textContent = qr.description;
                    card.appendChild(desc);
                }
                grid.appendChild(card);
            }
        }

        (async function loadManifest() {
            for (const p of MANIFEST_PATHS) {
                try {
                    const r = await fetch(p, { cache: 'no-store' });
                    if (!r.ok) continue;
                    renderManifest(await r.json());
                    return;
                } catch (e) { /* try next */ }
            }
            document.getElementById('qr-grid').innerHTML =
                '<p style="color:#fca5a5">Failed to load qrcodes.json. Tried: <code>' +
                MANIFEST_PATHS.join('</code>, <code>') + '</code></p>';
        })();

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') closeModal();
        });
    </script>
