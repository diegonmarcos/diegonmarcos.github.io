        run: |
          echo "🔨 Building CV Web..."
          cd b-Profiles/cv_web
          bash build.sh build
          cd ../..
          echo "✅ CV Web build complete"
      - name: 🔨 Build MyFeed
        id: build-myfeed
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/myfeed/src/')

        run: |
          echo "🔨 Building MyFeed..."
          cd c-MyTools/myfeed
          bash build.sh build
          cd ../..
          echo "✅ MyFeed build complete"
      - name: 🔨 Build MyGames
        id: build-mygames
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/mygames/src/')

