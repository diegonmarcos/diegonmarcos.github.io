        run: |
          echo "🔨 Building Sailytics..."
          cd e-Others/sailytics
          bash build.sh build
          cd ../..
          echo "✅ Sailytics build complete"
      - name: 🔨 Build MyMail
        id: build-mymail
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/mymail/src/')

        run: |
          echo "🔨 Building MyMail..."
          cd c-Suite/mymail
          bash build.sh build
          cd ../..
          echo "✅ MyMail build complete"
      - name: 🔨 Build MyPhotos
        id: build-myphotos
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/myphotos/src/')

        run: |
          echo "🔨 Building MyPhotos..."
          cd c-Suite/myphotos
          bash build.sh build
          cd ../..
          echo "✅ MyPhotos build complete"
      - name: 🔨 Build MyAnalytics
        id: build-myanalytics
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/myanalytics/src/')

        run: |
          echo "🔨 Building MyAnalytics..."
          cd c-Suite/myanalytics
          bash build.sh build
          cd ../..
          echo "✅ MyAnalytics build complete"
      - name: 🔨 Build Suite
        id: build-suite
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/suite/src/')

        run: |
          echo "🔨 Building Suite..."
          cd c-Suite/suite
          bash build.sh build
          cd ../..
          echo "✅ Suite build complete"
      - name: 🔨 Build Health Tracker
        id: build-health-tracker
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/health_tracker/src/')

        run: |
          echo "🔨 Building Health Tracker..."
          cd c-Tools/health_tracker
          bash build.sh build
          cd ../..
          echo "✅ Health Tracker build complete"
      - name: 🔨 Build Market Watch
        id: build-market-watch
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/market_watch/src/')

        run: |
          echo "🔨 Building Market Watch..."
          cd c-Tools/market_watch
          bash build.sh build
          cd ../..
          echo "✅ Market Watch build complete"
      - name: 🔨 Build Central Bank
        id: build-central-bank
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/central_bank/src/')

        run: |
          echo "🔨 Building Central Bank..."
          cd c-Tools/central_bank
          bash build.sh build
          cd ../..
          echo "✅ Central Bank build complete"
      - name: 🔨 Build MyProfile
        id: build-myprofile
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/myprofile/src/')

        run: |
          echo "🔨 Building MyProfile..."
          cd b-Profiles/myprofile
          bash build.sh build
          cd ../..
          echo "✅ MyProfile build complete"
      - name: 🔨 Build MyMovies (Vue 3)
        id: build-mymovies
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mymovies/src/')

        run: |
          echo "🔨 Building MyMovies..."
          cd c-Tools/mymovies
          bash build.sh build
          cd ../..
          echo "✅ MyMovies build complete"
      - name: 🔨 Build MyMusic (Vue 3)
        id: build-mymusic
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mymusic/src/')

        run: |
          echo "🔨 Building MyMusic..."
          cd c-Tools/mymusic
          bash build.sh build
          cd ../..
          echo "✅ MyMusic build complete"
      - name: 🔨 Build JSON Vision (Vue 3)
        id: build-json-vision
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/json-vision/src/')

        run: |
          echo "🔨 Building JSON Vision..."
          cd c-Suite/json-vision
          bash build.sh build
          cd ../..
          echo "✅ JSON Vision build complete"
      - name: 🔨 Build Carto (TypeScript + Sass)
        id: build-carto
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/carto/src/')

        run: |
          echo "🔨 Building Carto..."
          cd c-Tools/carto
          bash build.sh build
          cd ../..
          echo "✅ Carto build complete"
      - name: 🔨 Build MyTrips (Vue 3 + TypeScript + SCSS)
        id: build-mytrips
        if: >-
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mytrips/src/') ||
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mytrips/vite.config') ||
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mytrips/package.json') ||
          contains(steps.changed-files.outputs.all_changed_files, 'build.sh')

        run: |
          echo "🔨 Building MyTrips..."
          cd c-Tools/mytrips
          bash build.sh build
          cd ../..
          echo "✅ MyTrips build complete"
      - name: 🔨 Build Leafy (TypeScript + SCSS + Shaders)
        id: build-leafy
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/leafy/src/')

        run: |
          echo "🔨 Building Leafy..."
          cd b-Profiles/leafy
          bash build.sh build
          cd ../..
          echo "✅ Leafy build complete"
      - name: 🔨 Build MyMaps SvelteKit (SvelteKit + MapLibre)
        id: build-mymaps-svelte
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mymaps/src/')

        run: |
          echo "🔨 Building MyMaps SvelteKit..."
          cd c-Tools/mymaps
          bash build.sh build
          cd ../..
          echo "✅ MyMaps SvelteKit build complete"
      - name: 🔨 Build Maps Classic (React + Vite)
        id: build-maps-classic
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/maps/src/')

        run: |
          echo "🔨 Building Maps Classic..."
          cd c-Tools/maps
          bash build.sh build
          cd ../..
          echo "✅ Maps Classic build complete"
      # ============================================
      # MISSING BUILD STEPS (Previously only had copy steps)
      # ============================================
      - name: 🔨 Build CV PDF
        id: build-cv-pdf
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/cv_pdf/src/')

        run: |
          echo "🔨 Building CV PDF..."
          cd b-Profiles/cv_pdf
          bash build.sh build
          cd ../..
          echo "✅ CV PDF build complete"
      - name: 🔨 Build Astro
        id: build-astro
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/astro/src/')

        run: |
          echo "🔨 Building Astro..."
          cd c-Tools/astro
          bash build.sh build
          cd ../..
          echo "✅ Astro build complete"
      - name: 🔨 Build Skills & MCP Docs
        id: build-skills-mcp
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'd-Cloud/skills_mcp/src/')

        run: |
          echo "🔨 Building Skills & MCP Docs..."
          cd d-Cloud/skills_mcp
          bash build.sh build
          cd ../..
          echo "✅ Skills & MCP Docs build complete"
      - name: 🌐 Setup Pages Environment
        uses: actions/configure-pages@v5
      - name: 📂 Deploy All Projects to _site
        run: |
          echo "============================================"
          echo "📂 DEPLOYING ALL PROJECTS TO _site"
          echo "============================================"
          mkdir -p _site
          FAILED=""
          COPIED=0
          SKIPPED=0
          # Project registry: path:deploy_name
          PROJECTS=(
            "e-Root:."
            "a-Portals/cloud:cloud"
            "a-Portals/linktree:linktree"
            "a-Portals/linktree_mindmap:linktree_mindmap"
            "a-Portals/linktree_pixel-world:linktree_pixel-world"
            "b-Profiles/cv_pdf:cv_pdf"
            "b-Profiles/cv_web:cv_web"
            "b-Profiles/landpage:landpage"
            "b-Profiles/leafy:leafy"
            "b-Profiles/myprofile:myprofile"
            "b-Profiles/nexus:nexus"
            "c-Suite/json-vision:json-vision"
            "c-Suite/myanalytics:myanalytics"
            "c-Suite/mymail:mymail"
            "c-Suite/myphotos:myphotos"
            "c-Suite/suite:suite"
            "c-Tools/astro:astro"
            "c-Tools/carto:carto"
            "c-Tools/central_bank:central_bank"
            "c-Tools/feed_yourself:feed_yourself"
            "c-Tools/health_tracker:health_tracker"
            "c-Tools/maps:maps"
            "c-Tools/market_watch:market_watch"
            "c-Tools/myfeed:myfeed"
            "c-Tools/mygames:mygames"
            "c-Tools/mymaps:mymaps"
            "c-Tools/mymovies:mymovies"
            "c-Tools/mymusic:mymusic"
            "c-Tools/mytrips:mytrips"
            "d-Cloud/api:api"
            "d-Cloud/skills_mcp:skills_mcp"
            "e-Others/others:others"
            "e-Others/sailytics:sailytics"
          )
          for entry in "${PROJECTS[@]}"; do
            SRC="${entry%%:*}"
            NAME="${entry##*:}"
            DIST="$SRC/dist"
            # Special cases
            [ "$SRC" = "d-Cloud/api" ] && DIST="$SRC/src"
            if [ ! -d "$DIST" ]; then
              echo "⏭️  $NAME (no dist/)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            # Check dist has files
            if [ -z "$(ls -A "$DIST" 2>/dev/null)" ]; then
              echo "⚠️  $NAME (dist/ empty)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            # Copy (dot-copy resolves symlinks, never fails on empty)
            if [ "$NAME" = "." ]; then
              cp -rL "$DIST"/. _site/ 2>/dev/null || true
            else
              mkdir -p "_site/$NAME"
              cp -rL "$DIST"/. "_site/$NAME/" 2>/dev/null || true
            fi
            # Validate
            TARGET="_site"
            [ "$NAME" != "." ] && TARGET="_site/$NAME"
            COUNT=$(find "$TARGET" -type f 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "✅ $NAME ($COUNT files)"
              COPIED=$((COPIED + 1))
            else
              echo "❌ $NAME (0 files after copy)"
              FAILED="$FAILED $NAME"
            fi
          done
          # Summary
          echo "========================================="
          echo "📊 DEPLOY: $COPIED copied, $SKIPPED skipped"
          [ -n "$FAILED" ] && echo "⚠️ FAILED:$FAILED" && echo "::warning::Deploy failures:$FAILED"
          echo "========================================="
          # Clean broken symlinks
          find _site -type l ! -exec test -e {} \; -delete 2>/dev/null || true
          echo "📊 Site structure:"
          ls -lah _site/ | head -20
      - name: ⬆️ Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
