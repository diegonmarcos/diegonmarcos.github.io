window.API_PAGE = {
  title: "NocoDB",
  subtitle: "db.diegonmarcos.com — open-source Airtable alternative",
  base: "https://db.diegonmarcos.com",
  auth: {
    type: "header",
    key: "xc-token",
    label: "API Token",
    placeholder: "paste your NocoDB API token"
  },
  groups: [
    {
      label: "Meta",
      endpoints: [
        {
          name: "List Bases",
          method: "GET",
          path: "/api/v1/meta/tables",
          desc: "List all bases/projects",
          params: []
        },
        {
          name: "App Info",
          method: "GET",
          path: "/api/v1/meta/nocodb/info",
          params: []
        }
      ]
    },
    {
      label: "Tables",
      endpoints: [
        {
          name: "List Tables in Base",
          method: "GET",
          path: "/api/v1/meta/tables",
          params: [{ name: "baseId", label: "Base ID", type: "text", placeholder: "p_..." }]
        }
      ]
    },
    {
      label: "Records",
      endpoints: [
        {
          name: "List Records",
          method: "GET",
          path: "/api/v1/db/data/noco/{baseId}/{tableId}",
          params: [
            { name: "baseId", label: "Base ID", type: "text", placeholder: "p_..." },
            { name: "tableId", label: "Table ID", type: "text", placeholder: "md_..." },
            { name: "limit", label: "Limit", type: "text", placeholder: "25" }
          ]
        }
      ]
    }
  ]
};
