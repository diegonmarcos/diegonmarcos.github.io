name: "Regenerate front-topology + 2_configs"

on:
  push:
    branches: [main]
    paths:
      - '**/build.json'
      - 'build.sh'
      - 'a-Portals/linktree/src/data/**.json'
      - '2_configs/build.sh'
      - '2_configs/build.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gen-configs
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Generate front-topology.json (legacy submodule)
        run: bash build.sh config

      - name: Regenerate 2_configs/dist/ (unified manifest)
        run: bash 2_configs/build.sh rebuild

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add front-topology.json 2_configs/dist/ 2_configs/src/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: regenerate front-topology + 2_configs [skip ci]"
          git pull --rebase origin main
          git push
