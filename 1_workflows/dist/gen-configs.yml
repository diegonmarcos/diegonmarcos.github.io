name: "Regenerate config data (2_configs)"

on:
  push:
    branches: [main]
    paths:
      - '**/build.json'
      - '**/package.json'
      - 'build.sh'
      - 'a-Portals/linktree/src/data/**.json'
      - '2_configs/build.sh'
      - '2_configs/build.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gen-configs
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      # build.sh config → 2_configs/build.sh rebuild (consolidate + derive
      # front-topology.json + front-deps.json + front-data-*.json) → master index.
      # All outputs are committed in-repo; no submodule checkout needed.
      - name: Regenerate config data
        run: bash build.sh config

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 2_configs/dist/ 2_configs/src/ 0_______________________________/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: regenerate config data [skip ci]"
          git pull --rebase origin main
          git push
