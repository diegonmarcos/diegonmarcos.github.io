        run: |
          echo "🔨 Building MyPhotos..."
          cd c-MyTools/myphotos
          bash build.sh build
          cd ../..
          echo "✅ MyPhotos build complete"
- name: 🔨 Build Suite
        id: build-suite
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/suite/src/')

        run: |
          echo "🔨 Building Suite..."
          cd c-Suite/suite
          bash build.sh build
          cd ../..
          echo "✅ Suite build complete"
      - name: 🔨 Build MyHealth Profile
        id: build-myhealth-profile
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/myhealth-profile/src/')

        run: |
          echo "🔨 Building MyHealth Profile..."
          cd c-MyTools/myhealth-profile
          bash build.sh build
          cd ../..
          echo "✅ MyHealth Profile build complete"
      - name: 🔨 Build Market Watch
        id: build-market-watch
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-LabTools/market_watch/src/')

        run: |
          echo "🔨 Building Market Watch..."
          cd c-LabTools/market_watch
          bash build.sh build
          cd ../..
          echo "✅ Market Watch build complete"
      - name: 🔨 Build Central Bank
        id: build-central-bank
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-LabTools/central_bank/src/')

        run: |
          echo "🔨 Building Central Bank..."
          cd c-LabTools/central_bank
