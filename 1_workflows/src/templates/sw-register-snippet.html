<!-- sw-register: injected by mod_sw_register — DO NOT EDIT BY HAND. Re-runs are idempotent (the marker comment above gates the injection). -->
<script>
(function () {
  // ── Visible boot log: ALWAYS something in console, even if every other
  // script breaks. If the user sees nothing here, the inline script tag
  // itself was blocked (CSP, extension, etc.) — not a SW bug.
  var TAG = '[sw-register]';
  var t0 = Date.now();
  console.info(TAG, 'boot', { url: location.href, ua: navigator.userAgent.slice(0, 60) });

  if (!('serviceWorker' in navigator) || !location.protocol.startsWith('http')) {
    console.info(TAG, 'skip — no serviceWorker or non-http(s) origin');
    return;
  }

  var hadController = navigator.serviceWorker.controller !== null;
  console.info(TAG, 'controller-at-boot', hadController ? navigator.serviceWorker.controller.scriptURL : 'null');

  // ── Kill-switch ALWAYS available on window: dev can call from console
  //    or the auto-watchdog below uses it when the page stays blank.
  window.__resetSW = function (reason) {
    console.warn(TAG, '__resetSW invoked', { reason: reason || 'manual' });
    return navigator.serviceWorker.getRegistrations()
      .then(function (regs) {
        console.info(TAG, 'unregistering ' + regs.length + ' SW(s)');
        return Promise.all(regs.map(function (r) { return r.unregister(); }));
      })
      .then(function () {
        return caches.keys().then(function (keys) {
          console.info(TAG, 'purging ' + keys.length + ' cache(s)', keys);
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        });
      })
      .then(function () {
        console.info(TAG, 'reset complete — reloading');
        location.reload();
      });
  };

  // ── Reload on controllerchange ONLY when an OLD SW was replaced by a NEW one
  //    (post-deploy update). Skip on first-ever activation — reloading then
  //    aborts the in-flight `defer` script.js and the SPA never boots.
  var reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    console.info(TAG, 'controllerchange', {
      newController: navigator.serviceWorker.controller ? navigator.serviceWorker.controller.scriptURL : 'null',
      hadController: hadController,
      willReload: hadController && !reloading
    });
    if (!hadController || reloading) return;
    reloading = true;
    location.reload();
  });

  function reg() {
    console.info(TAG, 'registering ./script-service-worker.js');
    navigator.serviceWorker.register('./script-service-worker.js')
      .then(function (r) {
        console.info(TAG, 'register OK', {
          scope: r.scope,
          installing: !!r.installing,
          waiting: !!r.waiting,
          active: !!r.active
        });
      })
      .catch(function (e) {
        console.error(TAG, 'register FAILED', e && e.message);
      });
  }
  if ('requestIdleCallback' in window) requestIdleCallback(reg); else setTimeout(reg, 1);

  // ── Watchdog: if a SW is controlling the page AND the body's #app stays
  //    empty after 4 seconds AND there's no SPA mark in the DOM, assume the
  //    SW poisoned the response (stale precache, hash mismatch, partial
  //    fetch). Auto-reset and reload — the next load fetches fresh from
  //    network with no SW controller.
  //
  //    Only fires when hadController = true (i.e. NOT first-ever load).
  //    The 4s threshold is conservative — even a slow 3G load completes
  //    its critical-path script within 2s.
  if (hadController) {
    setTimeout(function () {
      var app = document.getElementById('app');
      var appEmpty = !app || (app.childElementCount === 0 && !app.textContent);
      var bodyEmpty = !document.body || document.body.childElementCount <= 1;
      console.info(TAG, 'watchdog t+' + (Date.now() - t0) + 'ms', {
        appEmpty: appEmpty, bodyEmpty: bodyEmpty,
        controller: navigator.serviceWorker.controller ? 'yes' : 'no'
      });
      if (appEmpty && bodyEmpty && navigator.serviceWorker.controller && !reloading) {
        reloading = true;
        window.__resetSW('watchdog: app + body still empty after 4s with SW in control');
      }
    }, 4000);
  }
})();
</script>
