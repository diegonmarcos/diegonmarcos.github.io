<body>

<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header__brand">
      <span class="header__icon">✨</span>
      <h1 class="header__title">myAstroLife <span>Full Analysis</span></h1>
    </div>
    <button id="edit-inputs-btn" class="header__btn hidden">
      ✕ Edit Inputs
    </button>
  </header>

  <!-- ── FORM ── -->
  <section id="form-section">
    <div class="form-card">
      <h2 class="form-card__title">Birth Chart Configuration</h2>
      <form id="birth-form" class="form-group" novalidate>
        <input
          id="name-input"
          type="text"
          class="form-input"
          placeholder="Name"
          value="Diego"
          required
        />
        <div class="form-row">
          <input id="date-input" type="date" class="form-input" value="1987-07-18" required />
          <input id="time-input" type="time" class="form-input" value="23:05" required />
        </div>
        <div class="form-city-wrapper">
          <input
            id="city-input"
            type="text"
            class="form-input"
            placeholder="City"
            autocomplete="off"
            required
          />
          <div id="city-dropdown" class="hidden"></div>
        </div>
        <button type="submit" class="form-submit">Generate Full Analysis</button>
      </form>
    </div>
  </section>

  <!-- ── LOADING ── -->
  <section id="loading-section" class="hidden">
    <div class="loading">
      <div class="loading__icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
      </div>
      <p class="loading__text">Calculating Planetary Positions...</p>
    </div>
  </section>

  <!-- ── RESULTS (populated by JS) ── -->
  <div id="results-section" class="hidden page__content"></div>

  <!-- ── GLOBE (standalone below map, populated by JS) ── -->
  <div id="globe-container" class="globe-container hidden"></div>

</div>
