name: GitHub Pages Deployment (CI)
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to compare changes
      - name: 📂 Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v41
      # ============================================
      # SETUP NODE.JS
      # ============================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Install Dependencies
        run: |
          echo "📦 Generating merged package.json and installing..."
          bash deploy.sh deps
          echo "✅ Dependencies installed"
      # ============================================
      # PROJECT BUILDS (All use build.sh)
      # ============================================
      - name: 🔨 Build Root Index (e-Root)
        id: build-c-root
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'e-Root/src/')

        run: |
          echo "🔨 Building Root Index (e-Root)..."
          cd e-Root
          bash build.sh build
          cd ..
          echo "✅ Root Index build complete"
      - name: 🔨 Build Landpage
        id: build-landpage
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/landpage/src/')

        run: |
          echo "🔨 Building Landpage..."
          cd b-Profiles/landpage
          bash build.sh build
          cd ../..
          echo "✅ Landpage build complete"
      - name: 🔨 Build Linktree
        id: build-linktree
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'a-Portals/linktree/src/')

        run: |
          echo "🔨 Building Linktree..."
          cd a-Portals/linktree
          bash build.sh build
          cd ../..
          echo "✅ Linktree build complete"
      - name: 🔨 Build Linktree Mindmap
        id: build-linktree-mindmap
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'a-Portals/linktree_mindmap/src/')

        run: |
          echo "🔨 Building Linktree Mindmap..."
          cd a-Portals/linktree_mindmap
          bash build.sh build
          cd ../..
          echo "✅ Linktree Mindmap build complete"
      - name: 🔨 Build Linktree Pixel World
        id: build-linktree-pixel-world
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'a-Portals/linktree_pixel-world/src/')

        run: |
          echo "🔨 Building Linktree Pixel World..."
          cd a-Portals/linktree_pixel-world
          bash build.sh build
          cd ../..
          echo "✅ Linktree Pixel World build complete"
      - name: 🔨 Build CV Web
        id: build-cv-web
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/cv_web/src/')

        run: |
          echo "🔨 Building CV Web..."
          cd b-Profiles/cv_web
          bash build.sh build
          cd ../..
          echo "✅ CV Web build complete"
      - name: 🔨 Build MyFeed
        id: build-myfeed
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/myfeed/src/')

        run: |
          echo "🔨 Building MyFeed..."
          cd c-Tools/myfeed
          bash build.sh build
          cd ../..
          echo "✅ MyFeed build complete"
      - name: 🔨 Build MyGames
        id: build-mygames
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Tools/mygames/src/')

        run: |
          echo "🔨 Building MyGames..."
          cd c-Tools/mygames
