<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myAstroLife - Personal myAstrology Dashboard</title>
  <meta name="description" content="Interactive myAstrology dashboard with 3D globe visualization and real planetary calculations." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />

  <!-- Matomo -->
  <script>
    var _mtm = window._mtm = window._mtm || [];
    _mtm.push({'mtm.startTime': (new Date().getTime()), 'event': 'mtm.Start'});
    (function() {
      var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
      g.async=true; g.src='https://analytics.diegonmarcos.com/js/container_odwLIyPV.js';
      s.parentNode.insertBefore(g,s);
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
<!-- Umami Analytics -->
<script async src="https://analytics.diegonmarcos.com/umami/script.js" data-website-id="937cbde7-5ec2-450c-9d6a-8117423ac12f"></script>
<!-- End Umami Analytics -->

    <!-- Data-driven framework: PORTAL_DATA["myAstro"] hydrated by front-data-json-js-wrapper.sh -->
    <script src="data-myAstro.json.js"></script>
    <script>(function(){var d=globalThis.PORTAL_DATA&&PORTAL_DATA["myAstro"];if(d&&d.title)document.title=d.title;})();</script>
  </head>
<body>

<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header__brand">
      <span class="header__icon">✨</span>
      <h1 class="header__title">myAstroLife <span>Full Analysis</span></h1>
    </div>
    <button id="edit-inputs-btn" class="header__btn hidden">
      ✕ Edit Inputs
    </button>
  </header>

  <!-- ── FORM ── -->
  <section id="form-section">
    <div class="form-card">
      <h2 class="form-card__title">Birth Chart Configuration</h2>
      <form id="birth-form" class="form-group" novalidate>
        <input
          id="name-input"
          type="text"
          class="form-input"
          placeholder="Name"
          value="Diego"
          required
        />
        <div class="form-row">
          <input id="date-input" type="date" class="form-input" value="1987-07-18" required />
          <input id="time-input" type="time" class="form-input" value="23:05" required />
        </div>
        <div class="form-city-wrapper">
          <input
            id="city-input"
            type="text"
            class="form-input"
            placeholder="City"
            autocomplete="off"
            required
          />
          <div id="city-dropdown" class="hidden"></div>
        </div>
        <button type="submit" class="form-submit">Generate Full Analysis</button>
      </form>
    </div>
  </section>

  <!-- ── LOADING ── -->
  <section id="loading-section" class="hidden">
    <div class="loading">
      <div class="loading__icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
      </div>
      <p class="loading__text">Calculating Planetary Positions...</p>
    </div>
  </section>

  <!-- ── RESULTS (populated by JS) ── -->
  <div id="results-section" class="hidden page__content"></div>

  <!-- ── GLOBE (standalone below map, populated by JS) ── -->
  <div id="globe-container" class="globe-container hidden"></div>

</div>

<!-- ── MODAL ── -->
<div id="modal-overlay" class="hidden modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-backdrop" class="modal-backdrop"></div>
  <div class="modal-dialog">
    <div class="modal-header">
      <div class="modal-header__brand">
        <span id="modal-icon" class="modal-header__icon"></span>
        <h3 id="modal-title" class="modal-header__title"></h3>
      </div>
      <button id="modal-close" class="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="modal-body" class="modal-body custom-scrollbar"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
