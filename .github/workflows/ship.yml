      - name: 🔨 Build MyMusic (Vue 3)
        id: build-mymusic
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/mymusic/src/')

        run: |
          echo "🔨 Building MyMusic..."
          cd c-MyTools/mymusic
          bash build.sh build
          cd ../..
          echo "✅ MyMusic build complete"
      - name: 🔨 Build JSON Vision (Vue 3)
        id: build-json-vision
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-Suite/json-vision/src/')

        run: |
          echo "🔨 Building JSON Vision..."
          cd c-Suite/json-vision
          bash build.sh build
          cd ../..
          echo "✅ JSON Vision build complete"
      - name: 🔨 Build Carto (TypeScript + Sass)
        id: build-carto
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-LabTools/carto/src/')

        run: |
          echo "🔨 Building Carto..."
          cd c-LabTools/carto
          bash build.sh build
          cd ../..
          echo "✅ Carto build complete"
      - name: 🔨 Build MyMaps MyTrips (Vue 3 + TypeScript + SCSS)
        id: build-mymaps-mytrips
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/mymaps-mytrips/src/')

        run: |
          echo "🔨 Building MyMaps MyTrips..."
          cd c-MyTools/mymaps-mytrips
          bash build.sh build
          cd ../..
          echo "✅ MyMaps MyTrips build complete"
      - name: 🔨 Build Leafy (TypeScript + SCSS + Shaders)
        id: build-leafy
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/leafy/src/')

        run: |
          echo "🔨 Building Leafy..."
          cd b-Profiles/leafy
          bash build.sh build
          cd ../..
          echo "✅ Leafy build complete"
      - name: 🔨 Build Stark (TypeScript + SCSS + Shaders)
        id: build-stark
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/stark/src/')

        run: |
          echo "🔨 Building Stark..."
          cd b-Profiles/stark
          bash build.sh build
          cd ../..
          echo "✅ Stark build complete"
      - name: 🔨 Build MyMaps Navigation (SvelteKit + MapLibre)
        id: build-mymaps-navigation
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/mymaps-navigation/src/')

        run: |
          echo "🔨 Building MyMaps Navigation..."
          cd c-MyTools/mymaps-navigation
          bash build.sh build
          cd ../..
          echo "✅ MyMaps Navigation build complete"
      - name: 🔨 Build MyMaps Maps (SvelteKit)
        id: build-mymaps-maps
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/mymaps-maps/src/')

        run: |
          echo "🔨 Building MyMaps Maps..."
          cd c-MyTools/mymaps-maps
          bash build.sh build
          cd ../..
          echo "✅ MyMaps Maps build complete"
      # ============================================
      # MISSING BUILD STEPS (Previously only had copy steps)
      # ============================================
      - name: 🔨 Build CV PDF
        id: build-cv-pdf
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'b-Profiles/cv_pdf/src/')

        run: |
          echo "🔨 Building CV PDF..."
          cd b-Profiles/cv_pdf
          bash build.sh build
          cd ../..
          echo "✅ CV PDF build complete"
      - name: 🔨 Build Astro
        id: build-astro
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'c-MyTools/astro/src/')

        run: |
          echo "🔨 Building Astro..."
          cd c-MyTools/astro
          bash build.sh build
          cd ../..
          echo "✅ Astro build complete"
      - name: 🔨 Build Skills & MCP Docs
        id: build-skills-mcp
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'd-Cloud/skills_mcp/src/')

        run: |
          echo "🔨 Building Skills & MCP Docs..."
          cd d-Cloud/skills_mcp
          bash build.sh build
          cd ../..
          echo "✅ Skills & MCP Docs build complete"
      - name: 🔨 Build MCP API Swagger
        id: build-mcp-api-swagger
        if:
          contains(steps.changed-files.outputs.all_changed_files, 'd-Cloud/mcp-api-swagger/src/')

        run: |
          echo "🔨 Building MCP API Swagger..."
          cd d-Cloud/mcp-api-swagger
          bash build.sh build
          cd ../..
          echo "✅ MCP API Swagger build complete"
      - name: 🌐 Setup Pages Environment
        uses: actions/configure-pages@v5
      - name: 📂 Deploy All Projects to _site
        run: |
          echo "============================================"
          echo "📂 DEPLOYING ALL PROJECTS TO _site"
          echo "============================================"
          mkdir -p _site
          FAILED=""
          COPIED=0
          SKIPPED=0
          # Project registry: path:deploy_name
          PROJECTS=(
            "e-Root:."
            "a-Portals/cloud:cloud"
            "a-Portals/linktree:linktree"
            "a-Portals/linktree_mindmap:linktree_mindmap"
            "a-Portals/linktree_pixel-world:linktree_pixel-world"
            "b-Profiles/cv_pdf:cv_pdf"
            "b-Profiles/cv_web:cv_web"
            "b-Profiles/landpage:landpage"
            "b-Profiles/leafy:leafy"
            "b-Profiles/myprofile:myprofile"
            "b-Profiles/nexus:nexus"
            "b-Profiles/stark:stark"
            "c-Suite/json-vision:json-vision"
            "c-Suite/mymail:mymail"
            "c-MyTools/myphotos:myphotos"
            "c-Suite/suite:suite"
            "c-MyTools/astro:astro"
            "c-LabTools/carto:carto"
            "c-LabTools/central_bank:central_bank"
            "c-MyTools/myhealth-feedyourself:myhealth-feedyourself"
            "c-MyTools/myhealth-profile:myhealth-profile"
            "c-MyTools/mymaps-maps:mymaps-maps"
            "c-LabTools/market_watch:market_watch"
            "c-MyTools/myfeed:myfeed"
            "c-MyTools/mygames:mygames"
            "c-MyTools/mymaps-navigation:mymaps-navigation"
            "c-MyTools/mymovies:mymovies"
            "c-MyTools/mymusic:mymusic"
            "c-MyTools/mymaps-mytrips:mymaps-mytrips"
            "d-Cloud/api:api"
            "d-Cloud/mcp-api-swagger:mcp-api-swagger"
            "d-Cloud/skills_mcp:skills_mcp"
            "e-Others/others:others"
            "c-LabTools/sailytics:sailytics"
          )
          for entry in "${PROJECTS[@]}"; do
            SRC="${entry%%:*}"
            NAME="${entry##*:}"
            DIST="$SRC/dist"
            # Special cases
            [ "$SRC" = "d-Cloud/api" ] && DIST="$SRC/src"
            if [ ! -d "$DIST" ]; then
              echo "⏭️  $NAME (no dist/)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            # Check dist has files
            if [ -z "$(ls -A "$DIST" 2>/dev/null)" ]; then
              echo "⚠️  $NAME (dist/ empty)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            # Copy (dot-copy resolves symlinks, never fails on empty)
            if [ "$NAME" = "." ]; then
              cp -rL "$DIST"/. _site/ 2>/dev/null || true
            else
              mkdir -p "_site/$NAME"
              cp -rL "$DIST"/. "_site/$NAME/" 2>/dev/null || true
            fi
            # Validate
            TARGET="_site"
            [ "$NAME" != "." ] && TARGET="_site/$NAME"
            COUNT=$(find "$TARGET" -type f 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "✅ $NAME ($COUNT files)"
              COPIED=$((COPIED + 1))
            else
              echo "❌ $NAME (0 files after copy)"
              FAILED="$FAILED $NAME"
            fi
          done
          # Summary
          echo "========================================="
          echo "📊 DEPLOY: $COPIED copied, $SKIPPED skipped"
          [ -n "$FAILED" ] && echo "⚠️ FAILED:$FAILED" && echo "::warning::Deploy failures:$FAILED"
          echo "========================================="
          # Clean broken symlinks
          find _site -type l ! -exec test -e {} \; -delete 2>/dev/null || true
          echo "📊 Site structure:"
          ls -lah _site/ | head -20
      - name: ⬆️ Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
